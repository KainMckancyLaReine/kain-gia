<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kain &amp; Gia · Onze foto's</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kain & Gia">
<link rel="apple-touch-icon" href="icon-512.png">

<style>
  :root{
    --bg:#0c0c0d;
    --bg2:#161617;
    --ink:#f4f3f1;
    --soft:#9a9893;
    --line:#2a2a2c;
    --card:#1a1a1c;
    --shadow:0 14px 38px rgba(0,0,0,.55);
    --radius:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    text-rendering:optimizeLegibility;
  }
  img{-webkit-user-drag:none}

  /* ---------- PRELOADER (foto-mozaïek hart) ---------- */
  .preloader{
    position:fixed;inset:0;z-index:200;overflow:hidden;
    background:radial-gradient(120% 90% at 50% 42%, #1c1c1e 0%, #0a0a0b 72%);
    transition:opacity .9s ease, visibility .9s ease;
  }
  .preloader.done{opacity:0;visibility:hidden}
  .mosaic{position:absolute;inset:0;transform-origin:50% 46%;will-change:transform,opacity}
  .preloader.zoom .mosaic{transform:scale(2.6);opacity:0;transition:transform 1s cubic-bezier(.55,.06,.68,.19), opacity 1s ease-in}
  .mtile{
    position:absolute;background-size:cover;background-position:center;border-radius:4px;
    opacity:0;will-change:transform,opacity;
    box-shadow:0 3px 10px rgba(0,0,0,.45);
    transition:transform .8s cubic-bezier(.4,0,.2,1), opacity .45s ease;
  }

  /* ---------- floating hearts + entrance ---------- */
  .flyfield{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:2}
  .fly{position:absolute;bottom:-30px;color:rgba(255,255,255,.16);animation:rise linear infinite}
  .fly svg{width:100%;height:100%;display:block}
  @keyframes rise{0%{transform:translateY(0) scale(.7) rotate(0);opacity:0}12%{opacity:.7}100%{transform:translateY(-115vh) scale(1.1) rotate(12deg);opacity:0}}
  .hero-content .heart,.hero-content .names,.hero-content .subtitle,.hero-content .stats{opacity:0}
  .hero-content .heart{transition:opacity 1s ease .1s}
  body.reveal .hero-content .heart{opacity:1}
  body.reveal .hero-content .names{animation:up 1.1s ease forwards .15s}
  body.reveal .hero-content .subtitle{animation:up .9s ease forwards .5s}
  body.reveal .hero-content .stats{animation:up .9s ease forwards .75s}
  @keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

  /* ---------- INTRO / LANDING ---------- */
  .hero{
    min-height:100vh;min-height:100svh;
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:max(40px,env(safe-area-inset-top)) 24px max(40px,env(safe-area-inset-bottom));
    position:relative;overflow:hidden;
    background:radial-gradient(130% 100% at 50% 16%, #242426 0%, #131314 44%, #0a0a0b 100%);
  }
  .hero::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;background:linear-gradient(transparent 0 49.5%, rgba(255,255,255,.018) 49.5% 50%, transparent 50%) 0 0/100% 4px;opacity:.5}
  /* dof gedimde achtergrondfoto achter de tekst */
  .hero-photo{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transform:scale(1.05);filter:grayscale(.1) brightness(.85) contrast(1.02);transition:opacity 1.3s ease}
  .hero-photo.on{opacity:1}
  .hero-photo-veil{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity 1.3s ease;
    background:radial-gradient(120% 100% at 50% 40%, rgba(0,0,0,.14), rgba(0,0,0,.34) 72%, rgba(8,8,9,.74)),linear-gradient(180deg, rgba(0,0,0,.26), rgba(0,0,0,.06) 45%, rgba(12,12,13,.88))}
  .hero-photo-veil.on{opacity:1}
  .hero-content{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center}
  .heart{width:42px;height:42px;margin-bottom:22px;color:#fff;animation:beat 2.6s ease-in-out infinite;filter:drop-shadow(0 2px 14px rgba(0,0,0,.6))}
  @keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.14)}30%{transform:scale(1)}}
  .names{
    font-family:'Cormorant Garamond',serif;font-weight:600;max-width:100%;
    font-size:clamp(46px,15vw,176px);line-height:.9;letter-spacing:1px;
    background:linear-gradient(100deg,#fff 0%,#8d8b86 22%,#fff 46%,#cfcdc8 60%,#8d8b86 80%,#fff 100%);
    background-size:220% auto;-webkit-background-clip:text;background-clip:text;
    color:transparent;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 6px 30px rgba(0,0,0,.55));
    animation:shine 7s linear infinite;
  }
  @keyframes shine{to{background-position:-220% center}}
  .names .amp{font-style:italic;font-weight:400;margin:0 .08em}
  .subtitle{
    margin-top:20px;font-size:clamp(11px,2.4vw,15px);
    letter-spacing:.5em;text-transform:uppercase;color:rgba(244,243,241,.8);font-weight:400;padding-left:.5em;
  }
  .stats{display:flex;flex-wrap:wrap;justify-content:center;align-items:stretch;margin-top:34px}
  .stat{padding:4px 26px;position:relative}
  .stat + .stat::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:1px;height:36px;background:rgba(255,255,255,.16)}
  .stat b{display:block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(28px,5.4vw,44px);color:#fff;line-height:1}
  .stat span{display:block;margin-top:7px;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--soft)}
  @media(max-width:560px){.stat{padding:4px 15px}.stat b{font-size:28px}}
  .scroll-cue{
    position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:3;
    color:rgba(244,243,241,.72);font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    display:flex;flex-direction:column;align-items:center;gap:8px;animation:float 2.4s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}
  .scroll-cue svg{width:18px;height:18px}

  /* ---------- GALLERY ---------- */
  .gallery-wrap{padding:70px clamp(12px,5vw,72px) 90px}
  @media(max-width:720px){.gallery-wrap{padding:48px 12px 70px}.tile{margin-bottom:10px}}
  .gallery-head{text-align:center;margin-bottom:40px}
  .gallery-head h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(28px,6vw,50px);color:var(--ink);font-style:italic}
  .gallery-head p{margin-top:10px;color:var(--soft);font-size:14px;letter-spacing:.06em}
  .toggle{
    margin-top:22px;display:inline-flex;border:1px solid var(--line);border-radius:30px;overflow:hidden;
    font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  }
  .toggle button{
    background:transparent;color:var(--soft);border:none;padding:9px 20px;cursor:pointer;transition:all .25s ease;font-family:inherit;letter-spacing:inherit;
  }
  .toggle button.active{background:var(--ink);color:var(--bg)}
  .gallery-head .toggle{margin:14px 6px 0}

  /* ---------- TIJDLIJN ---------- */
  #timeline{display:none;max-width:1100px;margin:0 auto}
  .tl-loading{text-align:center;color:var(--soft);padding:46px 14px;font-size:14px;max-width:580px;margin:0 auto;line-height:1.7}
  .tl-section{margin-bottom:40px}
  .tl-head{display:flex;align-items:center;gap:16px;margin:0 0 16px;color:var(--ink);font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:clamp(22px,4vw,32px)}
  .tl-head::before,.tl-head::after{content:"";height:1px;background:var(--line);flex:1}
  .tl-head span{white-space:nowrap}
  .tl-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  @media(max-width:600px){.tl-row{grid-template-columns:repeat(2,1fr);gap:8px}}
  .tl-tile{aspect-ratio:1/1;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--card);cursor:pointer;box-shadow:var(--shadow)}
  .tl-tile img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease,filter .4s ease}
  .tl-tile:hover img{transform:scale(1.06)}
  #timeline.bw .tl-tile img{filter:grayscale(1) contrast(1.05)}
  .tl-tile{position:relative}

  /* ---------- FAVORIETEN + ONDERSCHRIFTEN ---------- */
  .grid.fav-only .tile:not(.is-fav){display:none}
  .fav-btn{position:absolute;top:9px;right:9px;width:34px;height:34px;border:none;border-radius:50%;
    background:rgba(0,0,0,.42);backdrop-filter:blur(4px);cursor:pointer;display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s ease,transform .15s ease;z-index:4}
  .fav-btn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2}
  .tile:hover .fav-btn,.tl-tile:hover .fav-btn{opacity:1}
  .is-fav > .fav-btn{opacity:1}
  .is-fav > .fav-btn svg{fill:#e0586b;stroke:#e0586b}
  .fav-btn:active{transform:scale(.84)}
  @media(hover:none){.fav-btn{opacity:1;background:rgba(0,0,0,.34)}}

  .lb-fav{position:absolute;top:20px;left:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;transition:background .2s ease}
  .lb-fav:hover{background:rgba(255,255,255,.2)}
  .lb-fav svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2}
  .lb-fav.on svg{fill:#e0586b;stroke:#e0586b}
  .lb-cap{position:absolute;left:50%;transform:translateX(-50%);bottom:60px;max-width:min(86vw,620px);
    color:#fff;font-size:14px;line-height:1.5;text-align:center;cursor:text;
    background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(6px);padding:9px 16px;border-radius:14px}
  .lb-cap.empty .lb-cap-text{color:rgba(255,255,255,.5);font-style:italic}
  .lb-cap-edit{margin-left:8px;opacity:.55;font-size:12px}
  .lb-burst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:150px;height:150px;pointer-events:none;opacity:0;z-index:6}
  .lb-burst svg{width:100%;height:100%;fill:#fff;filter:drop-shadow(0 6px 26px rgba(0,0,0,.5))}
  .lb-burst.go{animation:burst .9s ease forwards}
  @keyframes burst{0%{transform:translate(-50%,-50%) scale(.3);opacity:0}18%{opacity:.95}45%{transform:translate(-50%,-50%) scale(1.05);opacity:.95}100%{transform:translate(-50%,-50%) scale(1.4);opacity:0}}

  .grid{column-count:4;column-gap:14px}
  @media(max-width:1100px){.grid{column-count:3}}
  @media(max-width:720px){.grid{column-count:2;column-gap:10px}}
  @media(max-width:360px){.grid{column-count:1}}
  .tile{
    break-inside:avoid;margin-bottom:14px;border-radius:var(--radius);overflow:hidden;
    background:var(--card);box-shadow:var(--shadow);cursor:pointer;position:relative;
    border:1px solid var(--line);
    opacity:0;transform:translateY(14px);transition:transform .6s ease,opacity .6s ease;
  }
  .tile.in{opacity:1;transform:none}
  .tile img{width:100%;display:block;transition:transform .6s ease,filter .5s ease;filter:grayscale(0)}
  .grid.bw .tile img{filter:grayscale(1) contrast(1.05)}
  .tile:hover img{transform:scale(1.045)}
  .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg2)}
  .loader span{width:20px;height:20px;border:2px solid #333;border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- LIGHTBOX ---------- */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.96);display:none;align-items:center;justify-content:center;z-index:50;opacity:0;transition:opacity .3s ease}
  .lb.open{display:flex;opacity:1}
  .lb img{max-width:92vw;max-height:86vh;border-radius:4px;box-shadow:0 24px 70px rgba(0,0,0,.7);user-select:none;transition:filter .4s ease}
  .lb.bw img{filter:grayscale(1) contrast(1.05)}
  .lb-close,.lb-nav{position:absolute;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#fff;cursor:pointer;backdrop-filter:blur(6px);transition:background .2s ease;display:flex;align-items:center;justify-content:center}
  .lb-close{top:20px;right:22px;width:44px;height:44px;border-radius:50%;font-size:20px}
  .lb-nav{top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%}
  .lb-nav:hover,.lb-close:hover{background:rgba(255,255,255,.2)}
  .lb-prev{left:18px}.lb-next{right:18px}
  .lb-nav svg{width:24px;height:24px}
  .lb-counter{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;letter-spacing:.2em;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);padding:7px 16px;border-radius:30px;backdrop-filter:blur(6px)}
  @media(max-width:600px){.lb-nav{width:44px;height:44px}.lb-prev{left:8px}.lb-next{right:8px}}

  footer{text-align:center;padding:46px 20px 60px;color:var(--soft);font-size:12px;line-height:1.8;border-top:1px solid var(--line);margin-top:20px}
</style>
</head>
<body>

  <!-- PRELOADER -->
  <div class="preloader" id="preloader">
    <div class="mosaic" id="mosaic"></div>
  </div>

  <!-- INTRO / LANDING -->
  <header class="hero">
    <div class="hero-photo" id="heroPhoto"></div>
    <div class="hero-photo-veil" id="heroVeil"></div>
    <div class="flyfield" id="flyfield"></div>
    <div class="hero-content">
      <svg class="heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.4 2 4.8 5.4 4.2 7.6 3.8 9.4 5 12 7.6 14.6 5 16.4 3.8 18.6 4.2 22 4.8 23.6 8.4 22 11.8 19.5 16.4 12 21 12 21z"/></svg>
      <h1 class="names">Kain<span class="amp">&amp;</span>Gia</h1>
      <p class="subtitle">Onze mooiste momenten</p>
      <div class="stats" id="stats"></div>
    </div>
    <div class="scroll-cue">
      <span>Bekijk</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </header>

  <!-- GALLERY -->
  <main class="gallery-wrap">
    <div class="gallery-head">
      <h2>Wij samen</h2>
      <p>Klik op een foto om groter te bekijken</p>
      <div class="toggle" id="viewToggle">
        <button data-view="grid" class="active">Raster</button>
        <button data-view="timeline">Tijdlijn</button>
        <button data-view="fav">Favorieten</button>
      </div>
      <div class="toggle" id="toggle">
        <button data-mode="color" class="active">Kleur</button>
        <button data-mode="bw">Zwart-wit</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div id="favEmpty" class="tl-loading" style="display:none">Nog geen favorieten. Tik op het ♥ rechtsboven een foto, of <strong>dubbeltik</strong> een foto in het groot om 'm te bewaren.</div>
    <div id="timeline"></div>
  </main>

  <footer>Dev By KainMckancy · 2026</footer>

  <!-- LIGHTBOX -->
  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose" aria-label="Sluiten">&times;</button>
    <button class="lb-fav" id="lbFav" aria-label="Favoriet"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Vorige"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <img id="lbImg" alt="">
    <button class="lb-nav lb-next" id="lbNext" aria-label="Volgende"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
    <div class="lb-cap empty" id="lbCap"><span class="lb-cap-text">Onderschrift toevoegen…</span><span class="lb-cap-edit">✎</span></div>
    <div class="lb-burst" id="lbBurst"></div>
    <div class="lb-counter" id="lbCounter"></div>
  </div>

<script>
/* ====== FOTO'S — voeg later een datum toe voor de tijdlijn, bv. {f:"IMG_3086.JPG", datum:"2025-07-14"} ====== */
const PHOTOS = [

];

const grid = document.getElementById('grid');
const url = name => encodeURIComponent(name);
const displayable = [];

/* ====== FAVORIETEN + ONDERSCHRIFTEN (bewaard op dit apparaat) ====== */
const FAV_KEY = 'kg_favs', CAP_KEY = 'kg_caps';
let favs = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));
let caps = JSON.parse(localStorage.getItem(CAP_KEY) || '{}');
let db = null;
const HEART_PATH = "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z";
const isFav = f => favs.has(f);
function setFav(f, on){
  if(on) favs.add(f); else favs.delete(f);
  localStorage.setItem(FAV_KEY, JSON.stringify([...favs]));
  document.querySelectorAll('[data-file]').forEach(el => { if(el.dataset.file === f) el.classList.toggle('is-fav', on); });
  updateFavView();
  if(db){ const r = db.ref('favs/' + safeKey(f)); on ? r.set(f) : r.remove(); }
}
function toggleFav(f){ setFav(f, !favs.has(f)); }
function makeFavBtn(f){
  const b = document.createElement('button');
  b.className = 'fav-btn'; b.type = 'button'; b.setAttribute('aria-label','Favoriet');
  b.innerHTML = "<svg viewBox='0 0 24 24'><path d='" + HEART_PATH + "'/></svg>";
  b.addEventListener('click', e => { e.stopPropagation(); toggleFav(f); });
  return b;
}
function updateFavView(){
  const note = document.getElementById('favEmpty');
  if(note) note.style.display = (grid.classList.contains('fav-only') && favs.size === 0) ? 'block' : 'none';
}

/* ====== SAMEN-SINDS + STATISTIEK — pas hier de startdatum aan (jaar, maand 0-11, dag) ====== */
const START = new Date(2021, 10, 28); // 28 november 2021
function renderStats(){
  const now = new Date();
  let y = now.getFullYear() - START.getFullYear();
  let m = now.getMonth() - START.getMonth();
  let d = now.getDate() - START.getDate();
  if(d < 0) m--;
  if(m < 0){ m += 12; y--; }
  const days = Math.floor((now - START) / 86400000);
  const stats = [
    [y, 'jaar'],
    [m, m === 1 ? 'maand' : 'maanden'],
    [days.toLocaleString('nl-NL'), 'dagen samen'],
    [PHOTOS.length, 'herinneringen']
  ];
  document.getElementById('stats').innerHTML = stats
    .map(s => '<div class="stat"><b>' + s[0] + '</b><span>' + s[1] + '</span></div>')
    .join('');
}
renderStats();
setInterval(renderStats, 60000);

/* ====== dof gedimde achtergrondfoto op het landingsscherm ======
   Zet je foto in DEZE map met de naam 'landing.jpg' (of .jpeg/.png) en hij verschijnt automatisch achter de tekst. */
(function(){
  const candidates = ["landing.jpg","landing.jpeg","landing.png","landing.JPG","landing.JPEG","landing.PNG"];
  const photo = document.getElementById('heroPhoto');
  const veil  = document.getElementById('heroVeil');
  (function tryNext(i){
    if(i >= candidates.length) return;            // niets gevonden -> nette donkere achtergrond blijft
    const img = new Image();
    img.onload  = () => {
      photo.style.backgroundImage = "url('" + encodeURIComponent(candidates[i]) + "')";
      photo.classList.add('on');
      veil.classList.add('on');
    };
    img.onerror = () => tryNext(i + 1);
    img.src = encodeURIComponent(candidates[i]);
  })(0);
})();

/* ====== PRELOADER: foto-mozaïek hart + zwevende hartjes ====== */
(function(){
  /* --- zwevende hartjes in de hero --- */
  const field = document.getElementById('flyfield');
  const heartSVG = "<svg viewBox='0 0 24 24' fill='currentColor'><path d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>";
  for(let i=0;i<11;i++){
    const h = document.createElement('div');
    h.className = 'fly';
    const size = 10 + Math.random()*26;
    h.style.left = (Math.random()*100) + '%';
    h.style.width = size + 'px';
    h.style.height = size + 'px';
    h.style.animationDuration = (9 + Math.random()*10) + 's';
    h.style.animationDelay = (Math.random()*12) + 's';
    h.innerHTML = heartSVG;
    field.appendChild(h);
  }

  /* --- vooraf bepaalde, SYMMETRISCHE hart-coördinaten (deterministisch, niet willekeurig) --- */
  /* kleine, vaste set foto's -> laadt snel (tegels hergebruiken deze) */
  const photos = ["IMG_6150.JPG","IMG_5656.JPG","IMG_4144.JPG","IMG_4679.JPG","IMG_3086.JPG","IMG_0869.JPG","IMG_1435.JPG","IMG_5050.JPG","IMG_4715.JPG","IMG_3957.JPG","IMG_0564.jpg","IMG_2293.jpg","IMG_5868.jpg","IMG_7405.jpg"];
  const STEP = 0.2;
  const targets = [];
  for(let y = 1.3; y >= -1.1; y -= STEP){
    for(let xi = -7; xi <= 7; xi++){          // vaste, symmetrische kolommen rond x=0
      const x = xi * STEP;
      const v = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;   // hart-vergelijking
      if(v <= 0) targets.push({x:x, y:y});
    }
  }
  /* het hart vormt zich van binnen naar buiten */
  targets.sort((a,b) =>
    (a.x*a.x + (a.y-0.35)*(a.y-0.35)) - (b.x*b.x + (b.y-0.35)*(b.y-0.35)));

  /* --- responsieve schaal + plaatsing --- */
  const mosaic = document.getElementById('mosaic');
  const vw = window.innerWidth, vh = window.innerHeight;
  const S  = Math.min(vw, vh) * 0.32;     // schaalt mee op desktop en mobiel
  const cx = vw / 2, cy = vh * 0.46;
  const tsize = STEP * S * 1.24;          // tegels overlappen iets -> dicht mozaïek

  targets.forEach((t, i) => {
    const fx = cx + t.x * S - tsize/2;    // doel-positie
    const fy = cy - t.y * S - tsize/2;
    const tile = document.createElement('div');
    tile.className = 'mtile';
    tile.style.width = tile.style.height = tsize + 'px';
    tile.style.left = fx + 'px';
    tile.style.top  = fy + 'px';
    tile.style.backgroundImage = "url('" + encodeURIComponent(photos[i % photos.length]) + "')";
    /* verspreide startpositie (alleen het START is vrij; het hart-DOEL is vast) */
    const sx = (Math.random()-0.5) * vw * 1.2;
    const sy = (Math.random()-0.5) * vh * 1.2;
    const rot = (Math.random()-0.5) * 140;
    tile.style.transform = 'translate3d(' + sx.toFixed(0) + 'px,' + sy.toFixed(0) + 'px,0) rotate(' + rot.toFixed(0) + 'deg) scale(.3)';
    tile.style.transitionDelay = (i * 8) + 'ms';   // trapsgewijze vertraging
    mosaic.appendChild(tile);
  });

  /* start de vloeiende beweging naar de hartvorm */
  requestAnimationFrame(() => requestAnimationFrame(() => {
    mosaic.querySelectorAll('.mtile').forEach(t => {
      t.style.transform = 'translate3d(0,0,0) rotate(0deg) scale(1)';
      t.style.opacity = '1';
    });
  }));

  const formTime = targets.length * 8 + 850;     // alle tegels op hun plek
  setTimeout(() => document.getElementById('preloader').classList.add('zoom'),
             formTime + 1400);                    // kort tonen, dan uitzoomen
  setTimeout(() => {
    document.getElementById('preloader').classList.add('done');
    document.body.classList.add('reveal');
  }, formTime + 1400 + 850);
})();

PHOTOS.forEach((p) => {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.dataset.file = p.f;
  if(isFav(p.f)) tile.classList.add('is-fav');
  const loader = document.createElement('div');
  loader.className = 'loader'; loader.innerHTML = '<span></span>';
  tile.appendChild(loader);
  const img = document.createElement('img');
  img.loading = 'lazy'; img.alt = 'Kain & Gia';
  img.onload = () => { loader.remove(); registerForLightbox(tile, img.src, p.f); };
  img.onerror = () => { loader.remove(); tile.style.display='none'; };
  img.src = url(p.f);
  tile.appendChild(img);
  tile.appendChild(makeFavBtn(p.f));
  grid.appendChild(tile);
});

/* ---------- KLEUR / ZWART-WIT TOGGLE ---------- */
const lb = document.getElementById('lb');
document.getElementById('toggle').addEventListener('click', e => {
  const btn = e.target.closest('button'); if(!btn) return;
  document.querySelectorAll('#toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const bw = btn.dataset.mode === 'bw';
  grid.classList.toggle('bw', bw);
  lb.classList.toggle('bw', bw);
});

/* ---------- LIGHTBOX ---------- */
const lbImg = document.getElementById('lbImg');
const lbCounter = document.getElementById('lbCounter');
let current = 0;
let lbList = displayable;
const lbFav = document.getElementById('lbFav');
const lbCap = document.getElementById('lbCap');
const lbBurst = document.getElementById('lbBurst');

function registerForLightbox(tile, src, file){
  const idx = displayable.length;
  displayable.push({src, file});
  tile.addEventListener('click', () => { lbList = displayable; openLb(idx); });
}
function openLb(i){ current=i; renderLb(); lb.classList.add('open'); document.body.style.overflow='hidden'; }
function closeLb(){ lb.classList.remove('open'); document.body.style.overflow=''; }
function nav(d){ current=(current+d+lbList.length)%lbList.length; renderLb(); }
function renderLb(){
  const it = lbList[current];
  lbImg.src = it.src;
  lbCounter.textContent = (current+1) + ' / ' + lbList.length;
  lbFav.classList.toggle('on', isFav(it.file));
  renderCaption(it.file);
}
function renderCaption(file){
  const c = caps[file] || '';
  lbCap.classList.toggle('empty', !c);
  lbCap.querySelector('.lb-cap-text').textContent = c || 'Onderschrift toevoegen…';
}
function showBurst(){
  lbBurst.innerHTML = "<svg viewBox='0 0 24 24'><path d='" + HEART_PATH + "'/></svg>";
  lbBurst.classList.remove('go'); void lbBurst.offsetWidth; lbBurst.classList.add('go');
}
function likeCurrent(){ const it = lbList[current]; setFav(it.file, true); lbFav.classList.add('on'); showBurst(); }

document.getElementById('lbClose').onclick = closeLb;
document.getElementById('lbPrev').onclick = e => { e.stopPropagation(); nav(-1); };
document.getElementById('lbNext').onclick = e => { e.stopPropagation(); nav(1); };
lbFav.addEventListener('click', e => { e.stopPropagation(); const it=lbList[current]; toggleFav(it.file); lbFav.classList.toggle('on', isFav(it.file)); });
lbCap.addEventListener('click', e => {
  e.stopPropagation();
  const it = lbList[current];
  const v = prompt('Onderschrift voor deze foto:', caps[it.file] || '');
  if(v === null) return;
  if(v.trim()) caps[it.file] = v.trim(); else delete caps[it.file];
  localStorage.setItem(CAP_KEY, JSON.stringify(caps));
  if(db){ const r = db.ref('caps/' + safeKey(it.file)); v.trim() ? r.set({f: it.file, t: v.trim()}) : r.remove(); }
  renderCaption(it.file);
});
lbImg.addEventListener('dblclick', e => { e.stopPropagation(); likeCurrent(); });
lb.addEventListener('click', e => { if(e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowLeft') nav(-1);
  if(e.key==='ArrowRight') nav(1);
});
let touchX=null, lastTap=0;
lb.addEventListener('touchstart', e => touchX=e.touches[0].clientX);
lb.addEventListener('touchend', e => {
  if(e.target === lbImg){          // dubbeltik op de foto = favoriet
    const now = Date.now();
    if(now - lastTap < 320){ likeCurrent(); lastTap = 0; return; }
    lastTap = now;
  }
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) > 50) nav(dx < 0 ? 1 : -1);
  touchX = null;
});

/* ---------- fade-in bij scrollen ---------- */
const io = new IntersectionObserver((entries) => {
  entries.forEach(en => { if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });
}, {rootMargin:'0px 0px -40px 0px'});
document.querySelectorAll('.tile').forEach(t => io.observe(t));

/* ====== SERVICE WORKER (PWA / offline) — werkt zodra de site live staat ====== */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

/* ====== TIJDLIJN-WEERGAVE — leest de opnamedatums uit de foto's (EXIF) ====== */
(function(){
  const tl = document.getElementById('timeline');
  const gridEl = document.getElementById('grid');
  const vToggle = document.getElementById('viewToggle');
  const MND = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  let built = false;

  vToggle.addEventListener('click', e => {
    const btn = e.target.closest('button'); if(!btn) return;
    vToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.view;
    gridEl.style.display = (v === 'timeline') ? 'none' : '';
    tl.style.display = (v === 'timeline') ? 'block' : 'none';
    gridEl.classList.toggle('fav-only', v === 'fav');
    updateFavView();
    if(v === 'timeline') build();
  });

  async function getDate(file){
    try{
      if(!window.exifr) return null;
      const d = await exifr.parse(encodeURIComponent(file), {pick:['DateTimeOriginal','CreateDate','ModifyDate']});
      return d ? (d.DateTimeOriginal || d.CreateDate || d.ModifyDate || null) : null;
    }catch(e){ return null; }
  }

  function addTile(row, file, srcs){
    const src = encodeURIComponent(file);
    const idx = srcs.length;
    srcs.push({src, file});
    const t = document.createElement('div'); t.className = 'tl-tile'; t.dataset.file = file;
    if(isFav(file)) t.classList.add('is-fav');
    const img = document.createElement('img'); img.loading = 'lazy'; img.alt = 'Kain & Gia';
    img.onerror = () => { t.style.display = 'none'; };
    img.src = src;
    t.addEventListener('click', () => { lbList = srcs; openLb(idx); });
    t.appendChild(img); t.appendChild(makeFavBtn(file)); row.appendChild(t);
  }

  function newSection(title){
    const s = document.createElement('div'); s.className = 'tl-section';
    const h = document.createElement('h3'); h.className = 'tl-head';
    h.innerHTML = '<span>' + title + '</span>';
    const r = document.createElement('div'); r.className = 'tl-row';
    s.appendChild(h); s.appendChild(r); tl.appendChild(s);
    return r;
  }

  async function build(){
    if(built) return; built = true;
    tl.innerHTML = '<div class="tl-loading">Opnamedatums worden gelezen…</div>';
    const items = await Promise.all(PHOTOS.map(async p => ({ f:p.f, dt: await getDate(p.f) })));
    const dated = items.filter(i => i.dt).sort((a,b) => new Date(a.dt) - new Date(b.dt));
    const undated = items.filter(i => !i.dt);
    tl.innerHTML = '';
    const srcs = [];

    if(dated.length === 0){
      tl.innerHTML = '<div class="tl-loading">De foto’s op datum gesorteerd verschijnen automatisch zodra de site live staat (GitHub Pages). Hieronder staan voorlopig al je foto’s.</div>';
      const r = newSection('Alle foto’s');
      items.forEach(it => addTile(r, it.f, srcs));
      bwSync(); return;
    }

    let curKey = '', row = null;
    dated.forEach(it => {
      const d = new Date(it.dt);
      const key = d.getFullYear() + '-' + d.getMonth();
      if(key !== curKey){ curKey = key; row = newSection(MND[d.getMonth()] + ' ' + d.getFullYear()); }
      addTile(row, it.f, srcs);
    });
    if(undated.length){
      const r = newSection('Zonder datum');
      undated.forEach(it => addTile(r, it.f, srcs));
    }
    bwSync();
  }

  function bwSync(){ tl.classList.toggle('bw', gridEl.classList.contains('bw')); }
  document.getElementById('toggle').addEventListener('click', () => setTimeout(bwSync, 0));
})();

function refreshAllFavUI(){
  document.querySelectorAll('[data-file]').forEach(el => el.classList.toggle('is-fav', favs.has(el.dataset.file)));
  if(typeof lb !== 'undefined' && lb.classList.contains('open') && lbList[current]) lbFav.classList.toggle('on', isFav(lbList[current].file));

(function initDB(){

    if(!FIREBASE_CONFIG.databaseURL || !window.firebase) return;   // nog niet ingesteld -> alleen lokaal
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    db.ref('favs').on('value', snap => {
      favs = new Set(Object.values(snap.val() || {}));
      localStorage.setItem(FAV_KEY, JSON.stringify([...favs]));
      refreshAllFavUI();
    });
    db.ref('caps').on('value', snap => {
      const val = snap.val() || {};
      caps = {};
      Object.values(val).forEach(o => { if(o && o.f) caps[o.f] = o.t; });
      localStorage.setItem(CAP_KEY, JSON.stringify(caps));
      refreshCaptionUI();
    });
  }catch(e){ db = null; }
